repos:
  - repo: local
    hooks:
      - id: prettier-frontend
        name: prettier (frontend)
        entry: bash -lc "cd frontend && npm run format"
        language: system
        pass_filenames: false
      - id: eslint-frontend
        name: eslint (frontend)
        entry: bash -lc "cd frontend && npm run lint:fix"
        language: system
        pass_filenames: false
      - id: gofmt-backend
        name: gofmt (backend)
        entry: bash -lc "gofmt -w ./backend"
        language: system
        pass_filenames: false
      - id: govet-backend
        name: go vet (backend)
        entry: bash -lc "cd backend && go vet ./..."
        language: system
        pass_filenames: false
