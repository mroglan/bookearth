repos:
  - repo: local
    hooks:
      - id: prettier-api
        name: prettier (api)
        entry: bash -lc "cd api && npm run format"
        language: system
        pass_filenames: false
      - id: prettier-frontend
        name: prettier (frontend)
        entry: bash -lc "cd frontend && npm run format"
        language: system
        pass_filenames: false
      - id: eslint-api
        name: eslint (api)
        entry: bash -lc "cd api && npm run lint:fix"
        language: system
        pass_filenames: false
      - id: eslint-frontend
        name: eslint (frontend)
        entry: bash -lc "cd frontend && npm run lint:fix"
        language: system
        pass_filenames: false
