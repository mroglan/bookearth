services:
  proxy:
    image: caddy:2.8-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - data:/data
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3000"
    expose:
      - "3000"

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      BACKEND_ENV: production
      PORT: "4000"
      DATA_DIR: /data
    expose:
      - "4000"
    volumes:
      - data:/data

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: bookearth
      POSTGRES_USER: bookearth
      POSTGRES_PASSWORD: bookearth
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro

volumes:
  data:
  db_data:
